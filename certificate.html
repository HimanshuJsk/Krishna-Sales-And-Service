<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Certificate - Krishna Sales And Service</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="krishna sales and service logo.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        /* Preloader */
        #preloader {
            background: #ffffff url(loading.gif) no-repeat center center;
            background-size: 20%;
            height: 100vh;
            width: 100%;
            position: fixed;
            z-index: 1000;
        }

        body {
            line-height: 1.5;
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .nav-link {
            color: black !important;
        }

        .nav-link:hover {
            color: #004a99 !important;
        }

        /* Certificate Section */
        .certificate-title {
            text-align: center;
            font-size: 40px;
            padding: 20px 0;
            color: #333;
        }

        .certificate-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding-bottom: 50px;
            justify-items: center;
        }

        .certificate-box {
            background: #fff;
            border: 3px solid #f0f0f0;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            aspect-ratio: 4 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            max-width: 300px;
            margin: auto;
        }

        .certificate-box img {
            width: 100%;
            height: 100%;
            padding: 10px;
        }

        /* Back to Top Button */
        #backToTop {
            position: fixed;
            bottom: 50px;
            right: 25px;
            z-index: 999;
            background-color: #004a99;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: none;
            transition: all 0.3s ease;
        }

        #backToTop:hover {
            background-color: #002f66;
            transform: translateY(-3px);
        }

        footer p {
            text-align: center;
            background-color: #fff8b5;
            padding: 15px;
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .certificate-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 576px) {
            .certificate-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- Preloader -->
    <div id="preloader"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light" style="background-color: #fff8b5;">
        <div class="container-fluid">
            <a href="index.html">
                <img src="krishna sales and service logo.png" alt="Krishna Sales And Service Logo" style="height: 50px;">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarSupportedContent">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About us</a></li>

                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                            Media
                        </a>
                        <ul class="dropdown-menu" style="background-color: #fff8b5;">
                            <li><a class="dropdown-item" href="gallery.html">Gallery</a></li>
                            <li><a class="dropdown-item" href="video.html">Video</a></li>
                        </ul>
                    </li>

                    <li class="nav-item"><a class="nav-link" href="service.html">Service</a></li>
                    <li class="nav-item active"><a class="nav-link" href="certificate.html">Certificate</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Certificate Content -->
    <div class="container">
        <h1 class="certificate-title">Our Certificates</h1>

        <div class="certificate-container">
            <div class="certificate-box">
                <img src="kc1.jpg" alt="Krishna Sales And Service Certificate">
            </div>
        </div>
    </div>

    <!-- Back to Top Button -->
    <button id="backToTop" title="Go to top">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 <a href="https://himanshudev.infy.uk/" style="color:black;text-decoration:none;">Himanshu Parmar</a></p>
    </footer>

    <!-- Scripts -->
    <script>
        window.addEventListener("load", function () {
            document.getElementById("preloader").style.display = "none";
        });

        // Back to Top Button
        const backToTop = document.getElementById("backToTop");

        window.addEventListener("scroll", () => {
            if (window.scrollY > 300) {
                backToTop.style.display = "block";
            } else {
                backToTop.style.display = "none";
            }
        });

        backToTop.addEventListener("click", () => {
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        });
    </script>

</body>
</html>
