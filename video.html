<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video - Krishna Sales And Service</title>
    <link rel="icon" type="image/png" href="krishna sales and service logo.png">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        /* Preloader */
        #preloader {
            background: #ffffff url(loading.gif) no-repeat center center;
            background-size: 20%;
            height: 100vh;
            width: 100%;
            position: fixed;
            z-index: 1000;
        }

        body {
            line-height: 1.5;
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .nav-link {
            color: black !important;
        }

        .nav-link:hover {
            color: #004a99 !important;
        }

        .dropdown-item.active {
            background-color: #e6dfa0;
            color: black;
        }

        .container {
            flex: 1;
            padding-bottom: 50px;
        }

        .container h1 {
            font-size: 40px;
            padding: 20px;
            color: #333;
            text-align: center;
            text-transform: capitalize;
        }

        /* Responsive Grid Layout */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 Columns on Desktop */
            gap: 25px;
            justify-items: center;
        }

        .video-card {
            background: #fff;
            border: 3px solid #f0f0f0;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 16 / 9; /* Maintains video proportions */
        }

        .inner {
            width: 100%;
            height: 100%;
        }

        .inner video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Back to Top Button */
        #backToTop {
            position: fixed;
            bottom: 50px;
            right: 25px;
            z-index: 999;
            background-color: #004a99;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: none;
            transition: all 0.3s ease;
        }

        #backToTop:hover {
            background-color: #002f66;
            transform: translateY(-3px);
        }

        footer p {
            text-align: center;
            background-color: #fff8b5;
            padding: 15px;
            font-size: 0.9rem;
        }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: 1fr; /* 1 Column on Mobile (Stacking rows) */
                gap: 20px;
            }
            .video-card {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <div id="preloader"></div>

    <nav class="navbar navbar-expand-lg navbar-light" style="background-color: #fff8b5;">
        <div class="container-fluid">
            <a href="index.html"><img src="krishna sales and service logo.png" alt="Krishna Sales And Service Logo" style="height: 50px;"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarSupportedContent">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About us</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" id="navbarDropdown" role="button" data-bs-toggle="dropdown">Media</a>
                        <ul class="dropdown-menu" style="background-color: #fff8b5;">
                            <li><a class="dropdown-item" href="gallery.html">Gallery</a></li>
                            <li><a class="dropdown-item active" href="video.html">Video</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="service.html">Service</a></li>
                    <li class="nav-item"><a class="nav-link" href="certificate.html">Certificate</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1>Video</h1>
        
        <div class="video-grid">
            <div class="video-card">
                <div class="inner">
                    <video controls>
                        <source src="kss.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
            </div>

            <div class="video-card">
                <div class="inner">
                    <video controls>
                        <source src="aquajade.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
            </div>
        </div>
    </div>

    <!-- Back to Top Button -->
    <button id="backToTop" title="Go to top">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 <a href="https://himanshudev.infy.uk/" style="color:black;text-decoration:none;">Himanshu Parmar</a></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.addEventListener("load", function() {
            document.getElementById("preloader").style.display = "none";
        });

        // Back to Top Button
        const backToTop = document.getElementById("backToTop");

        window.addEventListener("scroll", () => {
            if (window.scrollY > 300) {
                backToTop.style.display = "block";
            } else {
                backToTop.style.display = "none";
            }
        });

        backToTop.addEventListener("click", () => {
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        });
    </script>
</body>
</html>
