    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.5;
            background-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Preloader */
        #preloader {
            background: #ffffff url(loading.gif) no-repeat center center;
            background-size: 20%;
            height: 100vh;
            width: 100%;
            position: fixed;
            z-index: 1000;
        }

        .nav-link {
            color: black !important;
        }

        .nav-link:hover {
            text-decoration: none;
            color: #004a99 !important;
        }

        .dropdown-item.active {
            background-color: #e6dfa0;
            color: black;
        }

        .container {
            min-height: 100vh;
            padding-bottom: 50px;
        }

        h1 {
            font-size: 40px;
            padding: 20px;
            color: #333;
            text-align: center;
        }

        .image-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        .image-container .image {
            background: #fff;
            border: 3px solid #f0f0f0;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 1 / 1;
            display: flex;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .3s ease;
        }

        .image-container .image:hover img {
            transform: scale(1.1);
        }

        .popup-image {
            position: fixed;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.9);
            height: 100%;
            width: 100%;
            z-index: 2000;
            display: none;
        }

        .popup-image span {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 50px;
            color: #fff;
            cursor: pointer;
        }

        .popup-image img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 5px solid #fff;
            border-radius: 5px;
            max-width: 80%;
            max-height: 80%;
        }

        /* Back to Top Button */
        #backToTop {
            position: fixed;
            bottom: 50px;
            right: 25px;
            z-index: 999;
            background-color: #004a99;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: none;
            transition: all 0.3s ease;
        }

        #backToTop:hover {
            background-color: #002f66;
            transform: translateY(-3px);
        }

        footer p {
            text-align: center;
            background-color: #fff8b5;
            padding: 15px;
            font-size: 0.9rem;
        }

        @media (max-width: 992px) {
            .image-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 576px) {
            .image-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div id="preloader"></div>

            <div class="collapse navbar-collapse justify-content-end" id="navbarSupportedContent">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About us</a></li>

                    <li class="nav-item dropdown">

                            data-bs-toggle="dropdown" aria-expanded="false">
                            Media

                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown" style="background-color: #fff8b5;">
                            <li><a class="dropdown-item active" href="gallery.html">Gallery</a></li>

                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        window.addEventListener("load", function () {
            document.getElementById("preloader").style.display = "none";
        });

        document.querySelectorAll('.image-container img').forEach(image => {
            image.onclick = () => {
                document.querySelector('.popup-image').style.display = 'block';
                document.querySelector('.popup-image img').src = image.src;
            }
        });

        document.querySelector('.popup-image span').onclick = () => {
            document.querySelector('.popup-image').style.display = 'none';
        };

        // Back to Top Button
        const backToTop = document.getElementById("backToTop");

        window.addEventListener("scroll", () => {
            if (window.scrollY > 300) {
                backToTop.style.display = "block";
            } else {
                backToTop.style.display = "none";
            }
        });

        backToTop.addEventListener("click", () => {
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        });
    </script>

</body>
